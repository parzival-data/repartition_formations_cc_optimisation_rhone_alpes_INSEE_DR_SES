metadata:
  name: ear2027_formations_cc
  version: v1
  description: Configuration initiale pour la repartition des CC en formations EAR 2027.

inputs:
  communes_path: data/processed/communes_clean.csv
  travel_times_path: data/processed/temps_trajet_clean.csv
  compatibility_path: null
  missing_travel_time_policy: forbidden

columns:
  commune_id: code_commune
  commune_name: nom_commune
  population: population
  category: categorie
  territory_ear: territoire_EAR
  housing: logements
  latitude: latitude
  longitude: longitude
  origin_id: code_commune_origine
  destination_id: code_commune_pivot
  travel_time_minutes: temps_minutes
  compatibility_allowed: compatible

data_preparation:
  input_dir: donnee_brut_EAR27
  output_dir: data/processed
  raw_files:
    input_dir: donnee_brut_EAR27
    communes_file: info_minimum.ods
    travel_times_file: matrice_temps_trajets_max_90min.ods
    coordinates_file: cities_geocoded.ods
  raw_columns:
    coordinate_commune_id: insee_code
    latitude: lat
    longitude: lon
  communes:
    file: info_minimum.ods
    sheet: Feuille1
    columns:
      code_commune: Code commune
      nom_commune: Commune
      categorie: Catégorie
      territoire_EAR: Territoire EAR 2027
      population: Population 2023
      logements: Logements 2023
      latitude: Latitude
      longitude: Longitude
    category_mapping:
      PC: PC
      TPC: TPC
    output: data/processed/communes_clean.csv
  travel_times:
    file: matrice_temps_trajets_max_90min.ods
    sheet: matrix_minutes
    format: wide_matrix
    origin_column: origin
    output: data/processed/temps_trajet_clean.csv
  coordinates:
    file: cities_geocoded.ods
    sheet: cities
    crs: non precise dans le fichier source; colonnes conservees sans conversion
    columns:
      code_commune: insee_code
      nom_commune: name
      latitude: lat
      longitude: lon
    output: data/processed/communes_clean.csv
  compatibilities:
    file:
    output: data/processed/compatibilites_clean.csv
    default_when_absent: 1

parameters:
  T: 60
  Q: 14
  L: 6
  formation_budgets:
    B: 55
    f: 50
    k: 5
  cc_count:
    threshold_population: 5000
    below_or_equal: 1
    above: 2
  pivot_slots:
    M_PC: 3
    M_TPC: 1
  objective_weights:
    w_t: 100
    w_e: 1000
    w_m: 20
  eligibility_costs:
    infinity: 1000000000
    population_bands:
      - min: 1501
        max: null
        e_PC: 0
        e_TPC: 0
      - min: 1000
        max: 1500
        e_PC: 100
        e_TPC: 50
      - min: 500
        max: 999
        e_PC: 500
        e_TPC: 150
      - min: 0
        max: 499
        e_PC: 1000000000
        e_TPC: 500

solver:
  time_limit_seconds: 1200
  num_workers: 8
  random_seed: 1
  log_search_progress: true

relaxation:
  enabled: true
  w_m_values: [250, 100, 50]
  tpc_eligibility_cost_factors: [0.75, 0.5, 0.25]
  T_increase_factors: [1.10, 1.20, 1.30]
  L_decrease_steps: [1, 2, 3]
  Q_increase_steps: [1, 2, 5]
  budget_increase_steps:
    f: [1, 2]
    k: [1, 2]
    B: [2, 4]
  allow_replace_large_costs: true
  large_cost_threshold: 1000000000
  large_cost_replacement: 100000

exports:
  output_dir: outputs
  write_csv: true
  write_xlsx: true
  write_markdown_report: true
  alerts:
    capacity_close_ratio: 0.9
    low_fill_ratio: 0.35
    travel_close_ratio: 0.9
    high_tpc_mix_ratio: 0.4
    high_eligibility_cost: 500
    population_dispersion_ratio: 5.0
