metadata:
  name: test_config
  version: test

inputs:
  communes_path: tests/fixtures/communes_minimal.csv
  travel_times_path: tests/fixtures/temps_trajet_minimal.csv
  compatibility_path: null
  missing_travel_time_policy: forbidden

columns:
  commune_id: code_commune
  commune_name: nom_commune
  population: population
  category: categorie
  territory_ear: territoire_EAR
  housing: logements
  latitude: latitude
  longitude: longitude
  origin_id: commune_origine
  destination_id: commune_destination
  travel_time_minutes: temps_minutes
  compatibility_allowed: compatible

parameters:
  T: 90
  Q: 11
  L: 1
  formation_budgets:
    B: 55
    f: 45
    k: 10
  cc_count:
    threshold_population: 5000
    below_or_equal: 1
    above: 2
  pivot_slots:
    M_PC: 3
    M_TPC: 1
  objective_weights:
    w_t: 1
    w_e: 1000
    w_m: 500
  eligibility_costs:
    infinity: 1000000000
    population_bands:
      - min: 1501
        max: null
        e_PC: 0
        e_TPC: 0
      - min: 1000
        max: 1500
        e_PC: 100
        e_TPC: 50
      - min: 500
        max: 999
        e_PC: 500
        e_TPC: 150
      - min: 0
        max: 499
        e_PC: 1000000000
        e_TPC: 500

solver: {}
relaxation:
  enabled: true
  w_m_values: [250, 100]
  tpc_eligibility_cost_factors: [0.5]
  T_increase_factors: [1.5]
  L_decrease_steps: [1]
  Q_increase_steps: [1]
  budget_increase_steps:
    f: [1]
    k: [1]
    B: [2]
  allow_replace_large_costs: true
  large_cost_threshold: 1000000000
  large_cost_replacement: 100000
exports:
  output_dir: outputs
  write_csv: true
  write_xlsx: true
  write_markdown_report: true
  alerts:
    capacity_close_ratio: 0.9
    low_fill_ratio: 0.35
    travel_close_ratio: 0.9
    high_tpc_mix_ratio: 0.4
    high_eligibility_cost: 500
    population_dispersion_ratio: 5.0
